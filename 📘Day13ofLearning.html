<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="ie=edge">
  <title>student.report.card</title>
</head>
<body>
  <header>
    <h1>Student Report Card</h1>
  </header>
  <hr>
  <br>
  <form>
    <label for="name">Student name</label>
    <br>
    <input type="text" id="name"  
    placeholder="student name">
    <br>
    <br>
    <label for="number">Roll Number</label>
    <br>
    <input type="text" id="number" 
    placeholder="101">
    <br>
    <br>
    <label for="class">Class</label>
    <br>
    <input type="text" id="class" 
    placeholder="4th std">
    <br>
    <br>
    <label for="year">Academic Year</label>
    <br>
    <input type="number" id="year"
    placeholder="2026">
  </form>
  <br>
  <table border="1">
      <caption><strong><big>Student Report Card</big></strong></caption>
    <thead>
<tr>
      <th>Subject</th>
      <th>Internal</th>
      <th>External</th>
      <th>Total</th>
      <th>Grade</th>
</tr>
    </thead>
    <tr>
      <td>English</td>
      <td>24</td>
<td>68</td>
<td>92</td>
<td>A+</td>
    </tr>
        <tr>
      <td>Maths</td>
      <td>25</td>
<td>70</td>
<td>95</td>
<td>A+</td>
    </tr>
        <tr>
      <td>Computer Science</td>
      <td>23</td>
<td>69</td>
<td>92</td>
<td>A+</td>
    </tr>
    <tr>
      <td colspan="3">Grand Total</td>
      <td>279</td>
      <td>A+</td>
    </tr>
  </table>
  <br>
  <hr>
  <footer>Congratulations! Keep up the excellent work.</footer>
</body>
  </html>
