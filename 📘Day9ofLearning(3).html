<!DOCTYPE html>
<html>
  <head>
    <title>job-application-form</title>
  </head>
  <body>
    <form>
    <fieldset>
    <legend><b>Job Application Form</b></legend>
    <center>
    <h1>~:★ Job Application Form ★:~</h1>
    </center>
    <hr>
    <br>
    <fieldset>
    <legend><b>Personal Details</b></legend>
    <br>
      <label>Your Name:</label>
      <br>
      <input type="text" placeholder="Enter your name" required>
      <br>
      <br>
       <label>Father Name:</label>
        <br>
      <input type="text" placeholder="Enter your Father's name">
      <br>
      <br>
      <label>Mother Name:</label>
      <br>
      <input type="text" placeholder="Enter your Mother's name">
      <br>
      <br>
      <label for="email">Email</label>
      <br>
      <input type="email" id="email" placeholder="Enter your email" autocomplete="on" required>
      <br>
      <br>
      <label>Phone Number</label>
      <br>
      <input type="tel" placeholder="Enter your phone number" required>
      <br>
      <br>
      <label>Age</label>
      <br>
      <input type="number" placeholder="Your Age" required>
      <br>
      <br>
      <label>Date of Birth</label>
      <br>
      <input type="date" required>
      <br>
      <br>
      <b><label>Gender</label></b>
      <br>
      <input type="radio" name="gender" required>Male
      <br>
      <input type="radio" name="gender">Female
      <br>
      <input type="radio" name="gender">Other
      <br>
    </fieldset>
    <br>
    <fieldset>
    <legend><b>Education</b></legend>
    <select required>
        <option value="" selected disabled>Select Education</option>
        <option>Engineering</option>
        <option>BCA</option>
        <option>MCA</option>
        <option>Diploma</option>
    </select>
</fieldset>
    <br>
    <br>
    <fieldset>
    <legend><b>Skills</b></legend>
    <br>
    <label><input type="checkbox">HTML</label>
    <label><input type="checkbox">CSS</label>
    <label><input type="checkbox">JavaScript</label>
    <label><input type="checkbox">Python</label>
    <label><input type="checkbox">Others</label>
    </fieldset>
    <br>
    <br>
  <fieldset>
    <legend><b>Experience</b></legend>
    <textarea rows="9" cols="50" required></textarea>
</fieldset>
    <br>
    <br>
    <label><b>Resume Upload</b></label>
    <br>
    <input type="file" required>
    <br>
    <br>
    <label><strong>Willing to Relocate</strong></label>
    <br>
    <br>
    <input type="radio" name="relocate" required>Yes
    <br>
    <br>
    <input type="radio" name="relocate">No
    <center>
      <button type="submit"><big>Submit</big></button>
      <br>
      <br>
      <button type="reset"><big>Reset</big></button>
    </center>
    </fieldset>
        <hr>
    <footer>
    <p>Created by Yashavanth 😊</p>
</footer>
</form>
  </body>
</html>
