<!DOCTYPE html>
<html>
  <head>
    <title>feedback-form</title>
  </head>
  <body>
    <form>
    <fieldset>
      <legend>Feedback Form</legend>
      <center>
   <h1>Feedback Form</h1>
    </center>
    <hr>
    <br>
    <label>Name</label>
    <input type="text" placeholder="Enter your name" required>
    <br>
    <br>
    <label>Email</label>
    <input type="email" placeholder="Enter your email" autocomplete="on" required>
    <br>
    <br>
    <b>Rating</b>
    <br>
    <select required>
      <option value="" selected disabled>Select Rating</option>
      <option>Excellent</option>
      <option>Good</option>
      <option>Average</option>
      <option>Poor</option>
    </select>
    <br>
    <br>
    <strong>Feedback Message</strong>
    <br>
    <textarea rows="9" cols="50" placeholder="write your feedback here..." required=""></textarea>
    <hr>
    <br>
    <br>
    <center>
     <button type="submit"><big>Submit</big></button>
     <br>
     <br>
     <button type="reset"><big>Reset</big></button>
     <br>
     <br>
     <p><strong>Thank you for your valuable feedback!</strong></p>
    </center>
    </fieldset>
    </form>
  </body>
</html>
