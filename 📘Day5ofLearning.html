<!DOCTYPE html>
<html>
  <head>
    <title>student registration form</title>
  </head>
  <body>
    <big><center>
♥😊Welcome dear Student to the Registration Form♥😊</center>
</big>
      <h1>Student Registration Form</h1>
      <hr>
      <label>Full Name</label>
    <input type="text" placeholder="Enter your name">
    <br>
        <label>Email Address</label>
    <input type="email" placeholder="Enter your email">
    <br>
     <label>Email Password</label>
    <input type="password" placeholder="Enter your Email password">
    <br>
     <label>Enter your Age</label>
    <input type="number" placeholder="Your age">
    <br>
    <h3>Date of Birth</h3>
    <input type="date" placeholder="Your Date of Birth">
    <br>
    <h3>Phone number</h3>
    <input type="tel" placeholder="Your Phone number">
    <br>
    <br>
     <b>Gender</b>
    <br><input type="radio" name="gender"> Male
    <input type="radio" name="gender"> Female
    <br>
    <h3>Upload Your photo</h3>
    <input type="file">
    <br>
    <h3>Hobbies</h3>
    <label>Drawing</label>
    <input type="checkbox">
    <label>Dancing</label>
    <input type="checkbox">
    <label>Singing</label>
    <input type="checkbox">
    <label>Coding</label>
    <input type="checkbox">
    <br>
    <h3>Select Place</h3>
<select>
  <option>Select Your city</option>
  <option>Gangavathi</option>
  <option>Dharwada</option>
  <option>Gadag</option>
</select>
<fieldset>
    <legend>Student Address</legend>
<textarea rows="5" cols="30"></textarea>
</fieldset>
<button type="submit">Submit</button>
    <br>
<button type="reset">Reset</button>
  </body>
</html>
