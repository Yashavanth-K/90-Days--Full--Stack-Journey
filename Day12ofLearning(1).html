<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="ie=edge">
  <title>student.registration.form</title>
</head>
<body>
<fieldset>
  <legend>Student Registration Form</legend>
    <header>
    <h1>Student Registration Form</h1>
  </header>
  <hr>
  <br>
  <form>
    <section>
      <label for="name">Full name</label>
      <br>
      <input type="text" id="name"
      placeholder="Enter your name" required>
    </section>
    <br>
   <section>
     <label>Email</label>
     <br>
     <input type="email" placeholder="Enter your email" required>
   </section>
   <br>
   <section>
     <label>Password</label>
     <br><input type="password" minlength="8" maxlength="20" placeholder="Your email password"required>

   </section>
   <br>
   <section>
     <label>Phone Number</label>
     <br>
     <input type="tel" placeholder="********01" 
      maxlength="10" required>
   </section>
   <br>
   <section>
     <label>Date of Birth</label>
     <br>
     <input type="date" required>
   </section>
   <br>
   <section>
     <label><strong>Gender</strong></label>
     <br>
     <input type="radio" name="Gender" required>Male 
     <br>
    <input type="radio" name="Gender">Female
    <br>
    <input type="radio" name="Gender">Other
   </section>
   <br>
   <section>
     <strong>Course</strong>
     <br>
     <select required>
<option value="" selected disabled>Select Course</option>
       <option>B.A</option>
       <option>B.Sc</option>
       <option>BCA</option>
       <option>B.Com</option>
       <option>BBA</option>
       <option>BFSI</option>
     </select>
   </section>
   <br>
   <section>
     <strong>Skills</strong>
     <br>
     <input type="checkbox">html
     <br>
    <input type="checkbox">CSS
     <br>
     <input type="checkbox">JavaScript
     <br>
     <input type="checkbox">C
     <br>
     <input type="checkbox">C++
     <br>
     <input type="checkbox">DSA
     <br>
   </section>
   <br>
   <section>
<label for="address"><b>Address</b></label>
<br>
<textarea id="address" rows="4" cols="30"></textarea>
   </section>
  <br>
    <button type="submit"><big>Submit</big>
    </button>
  <br>
  <br>
  <button type="reset"><big>Reset</big>
  </button>
  </form>
</fieldset>
<hr>
        <footer>
  <p>♥ © 2026 K Yashavanth ♥</p>
</footer>
</body>
  </html>
