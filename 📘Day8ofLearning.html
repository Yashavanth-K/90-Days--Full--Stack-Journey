<!DOCTYPE html>
<html>
<head>
    <title>My Multimedia Page</title>
</head>
<body>
    <h1>My Multimedia Page</h1>
    <hr>
    <h2>My Image</h2>
    <img src="photo.jpg" alt="My Photo" width="250">
    <br><br>
    <h2>My Audio</h2>
    <audio controls>
        <source src="music.mp3" type="audio/mpeg">
        Your browser does not support the audio tag.
    </audio>
    <br><br>
    <h2>My Video</h2>
    <video width="400" controls>
        <source src="video.mp4" type="video/mp4">
        Your browser does not support the video tag.
    </video>
    <br><br>
    <h2>My Favorite YouTube Video</h2>
    <iframe
        width="560"
        height="315"
        src="https://www.youtube.com/embed/dQw4w9WgXcQ"
        title="YouTube video">
    </iframe>
    <hr>
    <footer>
        <p>2026 Yashavanth K | Day 8 - HTML Multimedia</p>
    </footer>
</body>
</html>
